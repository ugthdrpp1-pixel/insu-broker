name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel running jobs for the same branch on new pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, migrate, typecheck & lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Use a dedicated test DB in CI so we never touch a developer's local dev.db.
      DATABASE_URL: file:./prisma/.ci.db
      NEXTAUTH_SECRET: ci-test-secret-not-used-for-real-auth
      NEXTAUTH_URL: http://localhost:3000
      UPLOAD_DIR: ./uploads

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Prisma engines
        # node_modules/.prisma is wiped by `npm ci` above, so only ~/.cache/prisma
        # is actually restored. Either way, this speeds up the schema-engine download.
        uses: actions/cache@v4
        with:
          path: ~/.cache/prisma
          key: prisma-engines-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma', 'package-lock.json') }}
          restore-keys: prisma-engines-${{ runner.os }}-

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations on a clean SQLite
        # prisma migrate deploy applies pending migrations from prisma/migrations/*
        # against a brand-new SQLite file (a fresh clone scenario).
        run: |
          rm -f prisma/.ci.db prisma/.ci.db-journal
          npx prisma migrate deploy

      - name: Verify schema reachable on freshly-migrated DB
        # A fresh CI DB has 0 rows in every table; the test just confirms the
        # Prisma client can connect and query each table without throwing.
        run: |
          node -e "
            const { PrismaClient } = require('@prisma/client');
            const db = new PrismaClient();
            Promise.all([
              db.user.count(),
              db.insuranceProduct.count(),
              db.policy.count(),
            ])
              .then(([u, p, pol]) => {
                console.log('Reachable on empty CI DB (counts all 0): users=' + u + ' products=' + p + ' policies=' + pol);
                return db.\$disconnect();
              })
              .catch((e) => { console.error('CI DB FAIL:', e.message); process.exit(1); });
          "

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build
